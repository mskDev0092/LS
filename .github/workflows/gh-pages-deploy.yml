name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Compute GH_PAGES_BASE_PATH
        run: |
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "GH_PAGES_BASE_PATH=" >> $GITHUB_ENV
          else
            echo "GH_PAGES_BASE_PATH=/${{ github.event.repository.name }}" >> $GITHUB_ENV
          fi

      - name: Build and export (static)
        env:
          NEXT_EXPORT: "true"
          GH_PAGES_BASE_PATH: ${{ env.GH_PAGES_BASE_PATH }}
        run: |
          npm run build:export

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
