name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential python3 libvips-dev

      - name: Install dependencies
        run: npm install

      - name: Compute GH_PAGES_BASE_PATH
        run: |
          repo_name="${GITHUB_REPOSITORY##*/}"
          if [[ "${repo_name}" == *.github.io ]]; then
            echo "GH_PAGES_BASE_PATH=" >> $GITHUB_ENV
          else
            echo "GH_PAGES_BASE_PATH=/${repo_name}" >> $GITHUB_ENV
          fi

      - name: Build static site
        env:
          GH_PAGES_BASE_PATH: ${{ env.GH_PAGES_BASE_PATH }}
        run: npm run build

      - name: Verify out directory
        run: |
          if [ ! -d ./out ]; then
            echo "Error: ./out directory not found"
            ls -la
            exit 1
          fi
          echo "Static site built successfully"
          ls -la ./out | head -20

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
